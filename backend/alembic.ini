# Alembic configuration. The database URL is intentionally omitted here and read
# from application settings in alembic/env.py, so there is a single source of truth
# for where the database is and no credentials live in version control.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Migration filenames are prefixed with a zero-padded, monotonically increasing
# revision id for a readable, ordered history.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
