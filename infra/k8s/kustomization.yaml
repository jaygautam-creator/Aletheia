apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aletheia

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - backend.yaml
  - frontend.yaml
# secret.example.yaml is deliberately not listed: copy it to secret.yaml (never
# committed), fill in real values, and apply it separately — see the README.

labels:
  - pairs:
      app.kubernetes.io/part-of: aletheia
    includeSelectors: false
