# Example only. Copy to secret.yaml, fill in real values, and apply it separately:
#
#   cp secret.example.yaml secret.yaml   # secret.yaml is gitignored — never commit it
#   kubectl apply -f secret.yaml
#
# The kustomization intentionally does not include this file.
apiVersion: v1
kind: Secret
metadata:
  name: aletheia-secrets
  namespace: aletheia
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me
  DATABASE_URL: postgresql+psycopg://aletheia:change-me@postgres:5432/aletheia
  GROQ_API_KEY: ""
