# Weekly dependency PRs (D5). Grouped minor/patch updates keep the noise at one
# PR per ecosystem per week; majors arrive individually so they get real review.
version: 2
updates:
  - package-ecosystem: uv
    directory: /backend
    schedule:
      interval: weekly
    groups:
      backend-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # TypeScript 7 (the native-compiler rewrite) removes API surface that
      # eslint-config-next's pinned typescript-eslint still reads, so `next lint`
      # crashes at startup (PR #69). Drop this once Next.js supports TS 7.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
