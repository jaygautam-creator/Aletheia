name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · lint · type · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # pgvector-enabled Postgres so the database-backed integration tests
      # (ingestion + hybrid retrieval) run for real, not just the unit suite.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aletheia
          POSTGRES_PASSWORD: local-dev-only-change-me
          POSTGRES_DB: aletheia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aletheia -d aletheia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest

      - name: Integration tests (PostgreSQL + pgvector)
        # The schema is created by the test fixtures, so no migration step is needed.
        # Selects only the database-backed integration tests — the model-download
        # integration test stays out of CI.
        env:
          DATABASE_URL: postgresql+psycopg://aletheia:local-dev-only-change-me@localhost:5432/aletheia
        run: uv run pytest -m "integration and database"

      - name: Dependency audit (pip-audit, non-blocking)
        # Advisory for now (D5): surfaces known CVEs in the locked runtime deps
        # without failing the build. Tighten to blocking once the baseline is clean.
        continue-on-error: true
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt
          uvx pip-audit --requirement /tmp/requirements.txt --disable-pip

  infra:
    name: Infra · validate k8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Render kustomization
        run: kubectl kustomize infra/k8s > "$RUNNER_TEMP/rendered.yaml"

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP"

      - name: Validate against Kubernetes schemas
        run: '"$RUNNER_TEMP/kubeconform" -strict -summary "$RUNNER_TEMP/rendered.yaml"'

  frontend:
    name: Frontend · lint · type · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build

      - name: Type-check (tsc)
        run: npx tsc --noEmit
